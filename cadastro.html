<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Criar Conta</title>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        
        <div class="login-header">
            <div class="logo-container">
                <span class="icone-logo">🏗️</span>
                <h1 class="texto-logo">Construbook</h1>
            </div>
            <p class="subtitulo">Crie sua conta e comece a gerenciar</p>
        </div>
        
        <form id="formCadastro">
            
            <div class="input-group">
                <label for="nomeCadastro">Nome Completo</label>
                <input type="text" id="nomeCadastro" placeholder="Ex: Engenheiro Silva" required>
            </div>
            
            <div class="input-group">
                <label for="emailCadastro">E-mail</label>
                <input type="email" id="emailCadastro" placeholder="seu@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="senhaCadastro">Senha</label>
                <input type="password" id="senhaCadastro" placeholder="Mínimo de 6 caracteres" required>
            </div>
            
            <button type="submit" class="btn-primary">
                Criar Conta
            </button>
        </form>
        
        <div class="links-uteis" style="justify-content: center; gap: 8px;">
            <span style="color: #64748b;">Já tem uma conta?</span>
            <a href="index.html">Faça login aqui</a>
        </div>
        
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="cadastro.js"></script> </body>
</html>
