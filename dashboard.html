<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Painel Executivo</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <h2>🏗️ Construbook</h2>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Recoler/Expandir menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="sidebar-menu">
                <li class="active"><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="nova-obra.html"><i class="fas fa-building"></i> Obras</a></li>
                <li><a href="equipe.html"><i class="fas fa-users"></i> Equipe</a></li>
                <li><a href="fornecedores.html"><i class="fas fa-truck"></i> Fornecedores</a></li>
                <li><a href="documentos.html"><i class="fas fa-folder-open"></i> Documentos</a></li>
                <li><a href="contratos.html"><i class="fas fa-file-signature"></i> Contratos</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
            </ul>
        </aside>

        <div class="main-wrapper">
            
            <header class="topbar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar por obra, etapa...">
                </div>

                <div class="user-profile">
                    <i class="fas fa-bell notification-icon" style="margin-right: 15px; color: #64748b; cursor: pointer;"></i>
                    <div class="avatar-iniciais">EN</div>
                    <span class="user-name">Carregando...</span>
                </div>
            </header>

<main class="content">
    
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div>
            <h1>Painel de Obras</h1>
            <p>Acompanhamento visual e status dos projetos</p>
        </div>

        <button onclick="window.location.href='nova-obra.html'" class="btn-primary" style="padding: 12px 20px; font-size: 14px;">
            <i class="fas fa-plus"></i> Nova Obra
        </button>
    </div>

    <div class="kanban-board" style="margin-top: 10px;">
        
        <div class="kanban-column">
            <div class="kanban-header planning">
                <h3>📋 Planejamento</h3>
                <span class="badge" id="count-plan">0</span>
            </div>
            <div class="kanban-cards" id="col-planejamento"></div>
        </div>

        <div class="kanban-column">
            <div class="kanban-header active">
                <h3>🚧 Obras Ativas</h3>
                <span class="badge" id="count-ativas">0</span>
            </div>
            <div class="kanban-cards" id="col-ativas"></div>
        </div>

        <div class="kanban-column">
            <div class="kanban-header done">
                <h3>✅ Concluídas</h3>
                <span class="badge" id="count-concluidas">0</span>
            </div>
            <div class="kanban-cards" id="col-concluidas"></div>
        </div>

    </div>

</main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="dashboard.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
