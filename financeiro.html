<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Lançamentos Financeiros</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><h2>🏗️ Construbook</h2></div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="nova-obra.html"><i class="fas fa-building"></i> Obras</a></li>
                <li><a href="etapas.html"><i class="fas fa-tasks"></i> Etapas</a></li>
                <li><a href="compras.html"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                <li class="active"><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="relatorios.html"><i class="fas fa-file-pdf"></i> Relatórios</a></li>
            </ul>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar no sistema...">
                </div>
                <div class="user-profile">
                    <div class="avatar-iniciais">EN</div>
                    <span class="user-name">Carregando...</span>
                </div>
            </header>

            <main class="content">
                <div class="page-header">
                    <h1>Lançamentos Financeiros</h1>
                    <p>Registre as despesas e pagamentos das suas obras.</p>
                </div>

                <div class="card-content" style="max-width: 800px;">
                    <form id="formFinanceiro" class="form-grid">
                        <div class="input-group">
                            <label>Selecione a Obra</label>
                            <select id="obraSelectFinanceiro" required>
                                <option value="">Carregando obras...</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Categoria (Para o Gráfico)</label>
                            <select id="categoriaGasto" required>
                                <option value="Fundação">Fundação</option>
                                <option value="Alvenaria">Alvenaria</option>
                                <option value="Acabamento">Acabamento</option>
                                <option value="Mão de Obra">Mão de Obra</option>
                                <option value="Elétrica/Hidráulica">Elétrica/Hidráulica</option>
                            </select>
                        </div>

                        <div class="input-group full-width">
                            <label>Descrição do Gasto</label>
                            <input type="text" id="descricaoGasto" placeholder="Ex: Compra de 50 sacos de cimento" required>
                        </div>

                        <div class="input-group">
                            <label>Data do Pagamento</label>
                            <input type="date" id="dataGasto" required>
                        </div>

                        <div class="input-group">
                            <label>Valor (R$)</label>
                            <input type="text" id="valorGasto" placeholder="0,00" required>
                        </div>

                        <div class="form-actions full-width" style="margin-top: 20px;">
                            <button type="submit" class="btn-primary" style="width: 200px;">
                                <i class="fas fa-check-circle"></i> Salvar Despesa
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="financeiro.js"></script> </body>
</html>
