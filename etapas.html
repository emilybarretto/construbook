<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Cronograma e Etapas</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>🏗️ Construbook</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="nova-obra.html"><i class="fas fa-building"></i> Obras</a></li>
                <li class="active"><a href="etapas.html"><i class="fas fa-tasks"></i> Etapas</a></li>
                <li><a href="compras.html"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-line"></i> Relatórios</a></li>
            </ul>
        </aside>

        <div class="main-wrapper">
            
            <header class="topbar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar no sistema...">
                </div>
                <div class="user-profile">
                    <div class="avatar-iniciais">EN</div>
                    <span class="user-name">Carregando...</span>
                </div>
            </header>

            <main class="content">
                <div class="page-header">
                    <h1>Cronograma da Obra</h1>
                    <p>Gerencie o andamento das tarefas e o diário de fotos da construção</p>
                </div>

                <div class="card-content">
                    
                    <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        <label style="font-weight: 600; color: #334155;"><i class="fas fa-filter"></i> Selecionar Obra:</label>
                        <select id="obraSelectEtapas" style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; min-width: 300px; outline: none;">
                            <option value="">Carregando obras...</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 30px; display: flex; gap: 10px;">
                        <input type="text" id="novaEtapaInput" placeholder="Ex: Levantar paredes do 1º andar..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none;">
                        <button id="btnAdicionarEtapa" class="btn-primary">
                            <i class="fas fa-plus"></i> Adicionar Tarefa
                        </button>
                    </div>

                    <div class="kanban-board" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                        
                        <div class="kanban-column" style="background: #f1f5f9; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
                            <h3 style="border-bottom: 3px solid #94a3b8; padding-bottom: 10px; margin-bottom: 15px; color: #334155; display: flex; align-items: center; gap: 8px;">
                                📋 A Fazer
                            </h3>
                            <div id="colunaAFazer" style="min-height: 200px; display: flex; flex-direction: column; gap: 12px;">
                                </div>
                        </div>

                        <div class="kanban-column" style="background: #fffbeb; padding: 20px; border-radius: 12px; border: 1px solid #fde68a;">
                            <h3 style="border-bottom: 3px solid #fbbf24; padding-bottom: 10px; margin-bottom: 15px; color: #92400e; display: flex; align-items: center; gap: 8px;">
                                ⏳ Em Andamento
                            </h3>
                            <div id="colunaEmAndamento" style="min-height: 200px; display: flex; flex-direction: column; gap: 12px;">
                                </div>
                        </div>

                        <div class="kanban-column" style="background: #f0fdf4; padding: 20px; border-radius: 12px; border: 1px solid #bbf7d0;">
                            <h3 style="border-bottom: 3px solid #4ade80; padding-bottom: 10px; margin-bottom: 15px; color: #166534; display: flex; align-items: center; gap: 8px;">
                                ✅ Concluído
                            </h3>
                            <div id="colunaConcluido" style="min-height: 200px; display: flex; flex-direction: column; gap: 12px;">
                                </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalFoto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(4px);">
        <div style="background:white; padding:30px; border-radius:16px; width:90%; max-width:400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom:10px; color: #1e293b;">📸 Registrar Evolução</h3>
            <p id="nomeEtapaModal" style="font-weight:600; color: #3b82f6; margin-bottom:20px; font-size: 14px;"></p>
            
            <label style="display: block; margin-bottom: 10px; font-size: 13px; font-weight: 600;">Selecione a foto da obra:</label>
            <input type="file" id="inputFotoEtapa" accept="image/*" style="width: 100%; margin-bottom: 25px;">
            
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="fecharModal()" style="padding:10px 18px; border:1px solid #cbd5e1; background: white; border-radius: 8px; cursor:pointer; font-weight: 600;">Cancelar</button>
                <button id="btnSalvarFoto" class="btn-primary" style="padding:10px 18px;">Enviar Foto</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script> <script src="firebase-config.js"></script>
    <script src="etapas.js"></script>
</body>
</html>
