<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Configurações</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><h2>Construbook</h2></div>
            <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Recoler/Expandir menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="nova-obra.html"><i class="fas fa-building"></i> Obras</a></li>
                <li><a href="equipe.html"><i class="fas fa-users"></i> Equipe</a></li>
                <li><a href="fornecedores.html"><i class="fas fa-truck"></i> Fornecedores</a></li>
                <li><a href="documentos.html"><i class="fas fa-folder-open"></i> Documentos</a></li>
                <li><a href="contratos.html"><i class="fas fa-file-signature"></i> Contratos</a></li>
                <li class="active"><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
            </ul>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Buscar..."></div>
                <div class="user-profile">
                    <i class="fas fa-bell" style="margin-right:15px;color:#64748b;cursor:pointer;"></i>
                    <div class="avatar-iniciais">EN</div>
                    <span class="user-name">Carregando...</span>
                </div>
            </header>

            <main class="content">
                <div class="page-header"><h1>Configurações</h1><p>Gerencie sua conta e preferências</p></div>

                <!-- Perfil -->
                <div class="card-content" style="max-width:600px;margin-bottom:25px;">
                    <h3 style="margin-bottom:20px;font-size:16px;font-weight:700;color:#1e293b;"><i class="fas fa-user-circle" style="color:#3b82f6;margin-right:10px;"></i>Dados do Perfil</h3>
                    <form id="formPerfil" style="display:flex;flex-direction:column;gap:14px;">
                        <div class="input-group"><label>Nome Completo</label><input type="text" id="perfilNome"></div>
                        <div class="input-group"><label>Email</label><input type="email" id="perfilEmail" readonly style="background:#f8fafc;cursor:not-allowed;"></div>
                        <button type="submit" class="btn-primary" style="width:auto;padding:12px 30px;"><i class="fas fa-save"></i> Salvar Alterações</button>
                    </form>
                </div>

                <!-- Senha -->
                <div class="card-content" style="max-width:600px;margin-bottom:25px;">
                    <h3 style="margin-bottom:20px;font-size:16px;font-weight:700;color:#1e293b;"><i class="fas fa-lock" style="color:#8b5cf6;margin-right:10px;"></i>Alterar Senha</h3>
                    <form id="formSenha" style="display:flex;flex-direction:column;gap:14px;">
                        <div class="input-group"><label>Senha Atual</label><input type="password" id="senhaAtual" placeholder="Digite sua senha atual" required></div>
                        <div class="input-group"><label>Nova Senha</label><input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" required></div>
                        <button type="submit" class="btn-primary" style="width:auto;padding:12px 30px;background:#8b5cf6;"><i class="fas fa-key"></i> Alterar Senha</button>
                    </form>
                </div>

                <!-- Estatísticas -->
                <div class="card-content" style="max-width:600px;margin-bottom:25px;">
                    <h3 style="margin-bottom:20px;font-size:16px;font-weight:700;color:#1e293b;"><i class="fas fa-chart-bar" style="color:#10b981;margin-right:10px;"></i>Estatísticas da Conta</h3>
                    <div id="statsConta" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:14px;">
                        <div style="padding:16px;background:#f8fafc;border-radius:10px;"><span style="color:#64748b;display:block;font-size:12px;margin-bottom:4px;">Obras Criadas</span><strong id="statObras" style="font-size:22px;color:#3b82f6;">0</strong></div>
                        <div style="padding:16px;background:#f8fafc;border-radius:10px;"><span style="color:#64748b;display:block;font-size:12px;margin-bottom:4px;">Membros na Equipe</span><strong id="statEquipe" style="font-size:22px;color:#8b5cf6;">0</strong></div>
                        <div style="padding:16px;background:#f8fafc;border-radius:10px;"><span style="color:#64748b;display:block;font-size:12px;margin-bottom:4px;">Fornecedores</span><strong id="statFornecedores" style="font-size:22px;color:#f97316;">0</strong></div>
                        <div style="padding:16px;background:#f8fafc;border-radius:10px;"><span style="color:#64748b;display:block;font-size:12px;margin-bottom:4px;">Documentos</span><strong id="statDocs" style="font-size:22px;color:#10b981;">0</strong></div>
                    </div>
                </div>

                <!-- Sair -->
                <div style="text-align:center;padding:20px;">
                    <button onclick="fazerLogout()" style="border:none;background:#fee2e2;color:#ef4444;padding:14px 40px;border-radius:10px;cursor:pointer;font-weight:700;font-size:15px;transition:all 0.2s;">
                        <i class="fas fa-sign-out-alt"></i> Sair da Conta
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="configuracoes.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
