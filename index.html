<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construbook - Login</title>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        
        <div class="login-header">
            <div class="logo-container">
                <span class="icone-logo">🏗️</span>
                <h1 class="texto-logo">Construbook</h1>
            </div>
            <p class="subtitulo">Acesse o seu painel de controle</p>
        </div>
        
        <form id="formLogin">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="engenheiro@construbook.com.br" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">
                Entrar no Sistema
            </button>
        </form>
        
        <div class="links-uteis">
            <a href="#">Esqueci minha senha</a>
            <a href="cadastro.html">Criar uma conta</a>
        </div>
        
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
